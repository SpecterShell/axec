
docs:
  readme:
    title: axec
    tagline: 用於持久化非同步命令、Shell 與 REPL 工作階段的守護程序式 CLI 工具。
    summary: |
      - 透過輕量守護程序啟動獨立的 Shell、REPL 與命令工作階段
      - 不需中斷程序狀態，可隨時向同一工作階段傳送後續輸入
      - 支援串流讀取即時輸出，或檢視歷史紀錄與增量日誌
      - 後續可透過 CLI 指令列出工作階段、發送信號、終止、清理或連接工作階段
    quick_start_title: 快速入門
    quick_start_commands: |
      axec run --name py python
      axec input --session py --timeout 3 "print(40 + 2)"
      axec output --session py
      axec list
    docs_title: 說明文件
    docs_links: |
      - [使用指南]({{guide_path}})
      - [開發路線圖]({{plan_path}})
    build_title: 建置方式
    build_body: "常用本機建置指令："
    build_commands: |
      cargo build
      cargo test
      cargo run --bin render-docs
    license_title: 授權條款
    license_body: 本專案採用 MIT 授權條款釋出，詳情請參閱 [LICENSE]({{license_path}})。
  guide:
    title: 使用指南
    intro: axec 會將長時間執行的命令工作階段託管在背景守護程序中，後續呼叫 CLI 時即可重複使用原有程序狀態。
    overview_title: 功能總覽
    overview_body: |
      常見使用場景包含持久化 Python/Node REPL 環境、常駐 Shell 程序、需後續追蹤狀態的背景任務，以及需在多輪互動中保留程序狀態的代理工作流程。

      守護程序會在首次呼叫時自動啟動，所有工作階段將透過 UUID、可選名稱、狀態、時間戳、啟動指令與日誌檔進行追蹤。
    workflow_title: 核心指令
    workflow_body: |
      1. 啟動新工作階段前可先檢視當前工作階段狀態：

         ```bash
         target/debug/axec list
         target/debug/axec list --json
         ```

      2. 如需重複使用工作階段，可啟動具名工作階段：

         ```bash
         target/debug/axec run --name py python3
         target/debug/axec run --name shell bash
         ```

      3. 後續可向已存在的工作階段傳送輸入：

         ```bash
         target/debug/axec input --session py --timeout 3 "print(40 + 2)"
         target/debug/axec input --session shell "echo ready"
         ```

      4. 可依場景選擇合適的輸出讀取指令：

         ```bash
         target/debug/axec output --session py
         target/debug/axec cat --session py
         target/debug/axec cat --session py --stderr
         target/debug/axec cat --session py --follow
         ```

      5. 清理測試用途的臨時工作階段：

         ```bash
         target/debug/axec kill --session py
         target/debug/axec clean
         ```
    recipes_title: 進階用法
    recipes_body: |
      - 透過 `-` 參數從標準輸入傳送多行內容：

        ```bash
        target/debug/axec input --session py - <<'EOF'
        x = 40
        y = 2
        print(x + y)
        EOF
        ```

      - 透過管線傳遞多行輸入：

        ```bash
        printf 'first line\nsecond line\n' | target/debug/axec input --session shell -
        ```

      - 傳送輸入後等待指定終止詞（stopword）回傳：

        ```bash
        target/debug/axec input --session py --stopword 'ready|done' "run_job()"
        ```

      - 啟動非互動式命令並保持標準輸出與標準錯誤分離：

        ```bash
        target/debug/axec run --name build --backend pipe sh -c 'echo out; echo err >&2'
        target/debug/axec cat --session build
        target/debug/axec cat --session build --stderr
        ```

      - 執行一次性檢查類命令時使用 `--backend auto` 參數：

        ```bash
        target/debug/axec run --name check --backend auto sh -c 'echo ok; echo warn >&2; sleep 1'
        target/debug/axec list --json
        ```

      - 直接重複使用最近建立的工作階段：

        ```bash
        target/debug/axec output
        target/debug/axec input "echo follow-up"
        ```

      - 透過 UUID 唯一前綴定位工作階段：

        ```bash
        target/debug/axec list
        target/debug/axec cat --session 2a40f9d2
        ```

      - 輸出歷史日誌後持續追蹤即時輸出：

        ```bash
        target/debug/axec cat --session build --follow
        ```

      - 強制終止工作階段前先傳送優雅中斷訊號：

        ```bash
        target/debug/axec signal --session py SIGINT
        target/debug/axec kill --session py
        ```
    reference_title: 指令參考
    command_header: 指令
    behavior_header: 功能說明
    row_run: 啟動新工作階段，立即回傳工作階段 UUID，可搭配 `--timeout` 或 `--stopword` 串流讀取初始輸出。
    row_run_backend: "`--backend pty` 為預設值，會合併終端的標準輸出與標準錯誤；`pipe` 模式會強制分離兩個輸出串流；`auto` 模式會透過啟發式策略，在非互動場景下優先選擇 `pipe`。"
    row_cat: 預設輸出已記錄的標準輸出，加入 `--stderr` 參數時輸出標準錯誤，可搭配 `--follow` 即時追蹤後續輸出。
    row_output: 輸出該工作階段自上次輸出類指令執行後新增的標準輸出內容，省略 `--session` 時預設使用最近建立的工作階段。
    row_list: 顯示所有已追蹤工作階段的 UUID、名稱、狀態、啟動時間、結束時間與啟動指令。
    row_input: 向執行中的工作階段傳送文字內容，可選擇開啟串流輸出讀取，可設定正規比對終止條件。
    row_signal: 向工作階段傳送作業系統訊號（如 `SIGINT`），省略 `--session` 時預設使用最近建立的工作階段。
    row_kill: 強制終止指定工作階段，搭配 `--all` 參數可終止所有執行中的工作階段。
    row_clean: 刪除已退出的工作階段及其磁碟儲存的狀態資料，`clear` 為該指令的別名。
    row_attach: 開啟互動式終端連接執行中的工作階段，使用 `Ctrl+\` 快速鍵中斷工作階段連線。
    output_modes_title: 輸出模式說明
    output_modes_body: |
      `pty` 為預設後端，適用於全互動終端場景，會合併標準輸出與標準錯誤。

      `pipe` 適用於一次性命令與結構化工具場景，會分離兩個輸出串流；`auto` 模式會基於平台特性自動判斷，非互動負載下通常會優先選擇 `pipe`。
    selection_title: 工作階段選擇規則
    selection_body: |
      所有支援 `--session` 參數的指令，均可傳入完整 UUID、唯一 UUID 前綴或活躍工作階段的名稱定位目標工作階段。

      `cat`、`output`、`input`、`signal` 四個指令支援省略 `--session` 參數，此時會自動選擇最近啟動的工作階段。
