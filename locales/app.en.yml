help:
  app_about: Async command execution CLI for long-running REPL and shell sessions
  json: Emit structured JSON responses
  list_about: List tracked sessions
  run_about: Start a command in the background and return immediately unless streaming is requested
  cat_about: Print session output history and optionally follow live output
  output_about: Print stdout produced since the last output-aware command for the session
  input_about: Send input to a running session
  signal_about: Send an OS signal to a running session
  kill_about: Force-kill a running session
  attach_about: Interactively attach to a session
  clean_about: Remove exited sessions and their on-disk state
  name: Optional unique name for the session
  timeout: Stream output for N seconds before returning
  stopword: Wait until output matches this regex
  terminate: Terminate the session if the timeout is reached or wait until it exits naturally
  backend: "Session I/O backend: `pty` merges terminal output, `pipe` splits stdout/stderr, `auto` uses platform heuristics"
  cwd: Working directory for the spawned command
  env: Environment override in K=V form
  command: Command to execute
  follow: Continue streaming live output after printing history
  stderr: Show stderr history instead of stdout history
  input_text: Text to send to the session, or - to read stdin
  signal: Signal name or number
  session: Session UUID or active name
  all: Target all tracked running sessions
  missing_subcommand: A subcommand is required
  unknown_command: Unknown command
  invalid_env: --env expects K=V
