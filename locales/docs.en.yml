docs:
  readme:
    title: axec
    tagline: Daemon-backed CLI for persistent async command, shell, and REPL sessions.
    summary: |
      - start detached shells, REPLs, and commands behind a small daemon
      - send more input later without losing process state
      - stream live output or read historical and incremental logs
      - list, signal, kill, clean, or attach to sessions from later CLI calls
    quick_start_title: Quick Start
    quick_start_commands: |
      axec run --name py python
      axec input --session py --timeout 3 "print(40 + 2)"
      axec output --session py
      axec list
    docs_title: Documentation
    docs_links: |
      - [Guide]({{guide_path}})
      - [Implementation Plan]({{plan_path}})
    build_title: Build
    build_body: "Common local commands:"
    build_commands: |
      cargo build
      cargo test
      cargo run --bin render-docs
    license_title: License
    license_body: This project is licensed under the MIT License. See [LICENSE]({{license_path}}).
  guide:
    title: axec Guide
    intro: axec keeps long-running command sessions behind a background daemon so later CLI calls can keep using the same process state.
    overview_title: Overview
    overview_body: |
      Typical uses include persistent Python or Node REPLs, long-running shells, background jobs that need later inspection, and agent workflows that need to revisit process state across multiple turns.

      The daemon starts automatically on first use. Sessions are tracked by UUID, optional name, status, timestamps, command line, and log files.
    workflow_title: Core Workflow
    workflow_body: |
      1. Inspect current state before starting new sessions:

         ```bash
         target/debug/axec list
         target/debug/axec list --json
         ```

      2. Start a named session when the session will be reused:

         ```bash
         target/debug/axec run --name py python3
         target/debug/axec run --name shell bash
         ```

      3. Send more input later:

         ```bash
         target/debug/axec input --session py --timeout 3 "print(40 + 2)"
         target/debug/axec input --session shell "echo ready"
         ```

      4. Read output with the right command:

         ```bash
         target/debug/axec output --session py
         target/debug/axec cat --session py
         target/debug/axec cat --session py --stderr
         target/debug/axec cat --session py --follow
         ```

      5. Clean up sessions started for verification:

         ```bash
         target/debug/axec kill --session py
         target/debug/axec clean
         ```
    recipes_title: Advanced Commands
    recipes_body: |
      - Send multi-line input through stdin with `-`:

        ```bash
        target/debug/axec input --session py - <<'EOF'
        x = 40
        y = 2
        print(x + y)
        EOF
        ```

      - Send multi-line input from a pipe:

        ```bash
        printf 'first line\nsecond line\n' | target/debug/axec input --session shell -
        ```

      - Wait for a stopword while sending input:

        ```bash
        target/debug/axec input --session py --stopword 'ready|done' "run_job()"
        ```

      - Start a non-interactive command and keep stdout and stderr separated:

        ```bash
        target/debug/axec run --name build --backend pipe sh -c 'echo out; echo err >&2'
        target/debug/axec cat --session build
        target/debug/axec cat --session build --stderr
        ```

      - Use `--backend auto` for one-shot command checks:

        ```bash
        target/debug/axec run --name check --backend auto sh -c 'echo ok; echo warn >&2; sleep 1'
        target/debug/axec list --json
        ```

      - Reuse the latest session intentionally:

        ```bash
        target/debug/axec output
        target/debug/axec input "echo follow-up"
        ```

      - Target a session by unique UUID prefix:

        ```bash
        target/debug/axec list
        target/debug/axec cat --session 2a40f9d2
        ```

      - Follow live output after printing history:

        ```bash
        target/debug/axec cat --session build --follow
        ```

      - Interrupt gracefully before force-killing:

        ```bash
        target/debug/axec signal --session py SIGINT
        target/debug/axec kill --session py
        ```
    reference_title: Command Reference
    command_header: Command
    behavior_header: Behavior
    row_run: Start a session, return its UUID immediately, and optionally stream early output with `--timeout` or `--stopword`.
    row_run_backend: "`--backend pty` is the default and keeps merged terminal output; `pipe` forces split stdout/stderr, while `auto` uses heuristics to prefer `pipe` for non-interactive commands."
    row_cat: Print recorded stdout by default, `--stderr` when requested, and follow live output with `--follow`.
    row_output: Print unread stdout since the last output-aware command for that session. If `--session` is omitted, the latest session is used.
    row_list: Show tracked sessions with UUID, name, status, start time, exit time, and command line.
    row_input: Send text to a running session, optionally stream output, and optionally stop once a regex matches.
    row_signal: Send an OS signal such as `SIGINT`; if `--session` is omitted, the latest session is used.
    row_kill: Force-kill a specific session or all running sessions with `--all`.
    row_clean: Remove exited sessions and their on-disk state. `clear` is an alias.
    row_attach: Open an interactive terminal attached to a running session. Detach with `Ctrl+\`.
    output_modes_title: Output Modes
    output_modes_body: |
      `pty` is the default backend. It keeps stdout/stderr merged for fully interactive terminal sessions.

      `pipe` keeps them separate for one-shot commands and structured tooling, while `auto` applies platform heuristics and may prefer `pipe` for non-interactive workloads.
    selection_title: Session Selection
    selection_body: |
      Anywhere `--session` is accepted, you can pass a full UUID, a unique UUID prefix, or the active session name.

      `cat`, `output`, `input`, and `signal` also accept an omitted `--session`, in which case the latest started session is used.
    localization_title: Localization
    localization_body: "The CLI help follows your locale environment. `AXEC_LOCALE` overrides `LANG` and `LC_*` when you need a deterministic locale. Examples:"
    localization_example: |
      AXEC_LOCALE=zh-TW axec --help
      LANG=zh_CN.UTF-8 axec --help
      LANG=zh_TW.UTF-8 axec --help
    files_title: Files and State
    files_body: |
      By default, runtime socket and pid files live under `$XDG_RUNTIME_DIR/axec/` when available, otherwise `~/.axec/axec/`.

      Session metadata and logs live under `~/.axec/sessions/<uuid>/`, including `meta.json`, `stdout.log`, and `stderr.log`.
