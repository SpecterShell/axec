name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_name: axec-linux-x86_64
            archive_ext: tar.gz
          - name: linux-aarch64
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            artifact_name: axec-linux-aarch64
            archive_ext: tar.gz
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: axec-macos-aarch64
            archive_ext: tar.gz
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: axec-macos-x86_64
            archive_ext: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            vcvars_arch: amd64
            artifact_name: axec-windows-x86_64
            archive_ext: zip
          - name: windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            vcvars_arch: amd64_arm64
            artifact_name: axec-windows-aarch64
            archive_ext: zip
          - name: windows-i686
            os: windows-latest
            target: i686-pc-windows-msvc
            vcvars_arch: amd64_x86
            artifact_name: axec-windows-i686
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross --locked

      - name: Build release binary (Linux)
        if: runner.os == 'Linux'
        run: cross build --release --verbose --bins --target ${{ matrix.target }}

      - name: Build release binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --verbose --bins --target ${{ matrix.target }}

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL exit /b 1
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.vcvars_arch }}
          cargo build --release --verbose --bins --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/axec dist/axec
          cp target/${{ matrix.target }}/release/axrepl dist/axrepl
          chmod +x dist/axec dist/axrepl
          tar -czf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -C dist axec axrepl

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/axec.exe" "dist/axec.exe"
          Copy-Item "target/${{ matrix.target }}/release/axrepl.exe" "dist/axrepl.exe"
          Push-Location dist
          Compress-Archive -Path "axec.exe","axrepl.exe" -DestinationPath "../${{ matrix.artifact_name }}.${{ matrix.archive_ext }}" -Force
          Pop-Location

      - name: Upload workflow artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

      - name: Upload workflow artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/axec.exe
            dist/axrepl.exe
          if-no-files-found: error

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
