name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: axec-linux
            binary_name: axec
            archive_cmd: tar -czf
            archive_ext: tar.gz
          - os: macos-latest
            artifact_name: axec-macos
            binary_name: axec
            archive_cmd: tar -czf
            archive_ext: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          chmod +x dist/${{ matrix.binary_name }}
          ${{ matrix.archive_cmd }} ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -C dist ${{ matrix.binary_name }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
